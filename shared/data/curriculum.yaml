    target_grammar: "1. The Passive Imperfect (Παθητικός Παρατατικός): Ongoing past\
      \ actions in the passive voice.\n   Endings for Type A verbs (-ομαι):\n   -όμουν,\
      \ -όσουν, -όταν, -όμασταν, -όσασταν, -ονταν.\n   Example: Το σπίτι χτιζόταν\
      \ για δύο χρόνια. (The house was being built for two years.)\n2. Signal adverbs:\
      \ τότε, εκείνη την εποχή, σε εκείνη την περίοδο (at that time).\n3. Contrast\
      \ with active Imperfect: active χτιζόταν (was building) vs. passive χτιζόταν\
      \ (was being built) — same form, meaning determined by context.\n"
