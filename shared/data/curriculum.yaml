  - id: b3_c3
    order: 3
    suggested_length: medium
    language_skill: 'Skill: Using negation and time adverbs in the past.'
    target_grammar: "1. Syllabic augment in the aorist: verbs of two or fewer syllables\
      \ take the ε- prefix in the aorist (γράφω → έγραψα, πίνω → ήπια).\n2. Negation\
      \ in the past: δεν + aorist form.\n   Example: Δεν αγόρασα τίποτα. (I didn't\
      \ buy anything.)\n3. Time adverbs for the past: χθες (yesterday), πριν (before/ago),\
      \ την περασμένη εβδομάδα (last week), πέρυσι (last year).\n"
    mandatory_vocabulary:
    - χθες (yesterday)
    - πριν (before/ago)
    - δεν (not — negation)
