  - id: b9_c1
    order: 1
    suggested_length: medium
    language_skill: 'Skill: Expressing unreal past situations using Type 3 Conditionals.'
    target_grammar: "1. Type 3 Conditionals (Unreal/Impossible past):\n   Expressing\
      \ situations that did not happen in the past and their hypothetical results.\n\
      \   Structure: Αν + είχα + aorist infinitive (Past Perfect), θα + είχα + aorist\
      \ infinitive.\n   Example: Αν είχα διαβάσει, θα είχα περάσει τις εξετάσεις.\
      \ (If I had studied, I would have passed the exams.)\n2. All 6 persons of the\
      \ Past Perfect (Υπερσυντέλικος): είχα, είχες, είχε, είχαμε, είχατε, είχαν +\
      \ aorist infinitive.\n3. Negation: Αν δεν είχα ..., θα είχα ...\n"
    mandatory_vocabulary:
