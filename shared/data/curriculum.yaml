      \ short verbs).\n   Endings: -α, -ες, -ε, -αμε, -ατε, -αν.\n   Example: γράφω\
      \ → έγραψα (I wrote), αγοράζω → αγόρασα (I bought), διαβάζω → διάβασα (I read).\n"
