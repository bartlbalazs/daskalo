- id: book_2
  title: Interacting with the World
  description: Express what you want, describe objects with adjectives, and move through
    everyday situations.
  order: 2
  level: A1.2
  chapters:
  - id: b2_c1
    order: 1
    suggested_length: medium
    language_skill: 'Skill: Expressing desires and intentions.'
    target_grammar: "1. The modal verb θέλω (to want) fully conjugated in the present\
      \ tense:\n   θέλω, θέλεις, θέλει, θέλουμε, θέλετε, θέλουν.\n2. Introduction\
      \ to the subjunctive mood with να: θέλω να + verb stem expresses \"I want to\
      \ do something\".\n   Example: Θέλω να πάω (I want to go), Θέλεις να φας; (Do\
      \ you want to eat?).\n3. Cardinal numbers 1–20: ένα/μία, δύο, τρία, τέσσερα,\
      \ πέντε, έξι, επτά, οκτώ, εννέα, δέκα,\n   έντεκα, δώδεκα, δεκατρία, δεκατέσσερα,\
      \ δεκαπέντε, δεκαέξι, δεκαεπτά, δεκαοκτώ, δεκαεννέα, είκοσι.\n"
    mandatory_vocabulary:
    - θέλω (I want)
