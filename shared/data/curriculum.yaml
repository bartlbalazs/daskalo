    language_skill: 'Skill: Mixing conditional types for nuanced hypothetical expressions.'
    target_grammar: "1. Mixed Conditionals — combining Type 2 and Type 3:\n   Past\
      \ condition with present result: Αν + Past Perfect, θα + Imperfect/Present.\n\
      \   Example: Αν είχα σπουδάσει ιατρική, τώρα θα δούλευα ως γιατρός. (If I had\
      \ studied medicine, I would be working as a doctor now.)\n2. Present condition\
      \ with past result: Αν + Imperfect, θα + Past Perfect.\n   Example: Αν ήμουν\
      \ πλούσιος, θα είχα αγοράσει εκείνο το σπίτι. (If I were rich, I would have\
      \ bought that house.)\n3. Recognising which tense goes in which clause.\n"
