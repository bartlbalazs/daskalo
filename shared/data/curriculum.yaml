- id: book_3
  title: Moving in Time
  description: Break free from the present tense — talk about the future and narrate
    past events.
  order: 3
  level: A2.1
  chapters:
  - id: b3_c1
    order: 1
    suggested_length: medium
    language_skill: 'Skill: Making plans for the future.'
    target_grammar: "1. The simple future tense with θα:\n   θα + present-tense stem\
      \ forms the continuous future (what will be happening).\n   θα + aorist stem\
      \ (perfective stem) forms the simple future (what will happen, completed action).\n\
      \   Example: θα πίνω (I will be drinking — continuous) vs θα πιω (I will drink\
      \ — simple).\n2. Future with common regular verbs: γράφω→θα γράψω, διαβάζω→θα\
      \ διαβάσω, τρώω→θα φάω, πίνω→θα πιω.\n3. Time adverbs for the future: αύριο\
      \ (tomorrow), σύντομα (soon), μετά (later/after), την επόμενη εβδομάδα (next\
      \ week).\n"
    mandatory_vocabulary:
    - θα (future particle)
    - αύριο (tomorrow)
    - σύντομα (soon)
    - μετά (later)
    - θα πάω (I will go)
    - μεθαύριο (the day after tomorrow)
    - ποτέ (never)
    - πάντα (always)
    - το πρωί (in the morning)
    - θα φάω (I will eat)
    accumulated_grammar_summary: '1. The accusative case for definite articles (direct
      object):

      1. Adjective-noun agreement in gender, number, and case (nominative and accusative):

      1. Prepositions of place: σε (in/at/to), πάνω (on/above), κάτω (under), δίπλα
      (next to), μέσα (inside), έξω (outside).

      1. Telling time (Τι ώρα είναι;).'
    accumulated_vocabulary:
    - τον (the — masculine accusative)
    - την (the — feminine accusative)
    - βλέπω (I see)
    - πάω (I go)
    - αγοράζω (I buy)
    - καλός/ή/ό (good)
